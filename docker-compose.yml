services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai_reel_postgres
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
      POSTGRES_DB: ai_reel_generator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_reel_generator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_reel_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai_reel_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_reel_network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ai_reel_backend
    environment:
      DATABASE_URL: postgresql://ai_user:ai_password@postgres:5432/ai_reel_generator
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      DEBUG: "true"
      LOG_LEVEL: INFO
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - ai_reel_network

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: development
    container_name: ai_reel_frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - ai_reel_network

volumes:
  postgres_data:
  redis_data:

networks:
  ai_reel_network:
    driver: bridge
